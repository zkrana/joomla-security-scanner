name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build package and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sanity-check manifest version matches tag
        run: |
          manifest_version=$(grep -oPm1 "(?<=<version>)[^<]+" com_muruguard/muruguard.xml || true)
          tag_version="${{ steps.version.outputs.version }}"
          if [ -z "$manifest_version" ]; then
            echo "::error::Could not find com_muruguard/muruguard.xml or its <version> tag."
            exit 1
          fi
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::warning::Tag is v$tag_version but muruguard.xml <version> is $manifest_version -- update the manifest before releasing."
          fi

      - name: Build installable zip
        run: |
          mkdir -p dist
          cd com_muruguard
          zip -r "../dist/com_muruguard-${{ steps.version.outputs.version }}.zip" . -x ".*"
          cd ..

      - name: Verify manifest sits at zip root
        run: |
          zip_file="dist/com_muruguard-${{ steps.version.outputs.version }}.zip"
          if ! unzip -l "$zip_file" | grep -qE '^\s*[0-9]+.*\smuruguard\.xml$'; then
            echo "::error::muruguard.xml is not at the root of the built zip. Joomla install will fail."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          ver="${{ steps.version.outputs.version }}"
          awk -v ver="$ver" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > dist/release-notes.md
          # Trim leading/trailing blank lines so the release body doesn't
          # start/end with awkward empty space.
          sed -i -e '/./,$!d' -e ':a' -e '/^\n*$/{$d;N;ba' -e '}' dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            echo "::error::CHANGELOG.md has no '## [$ver]' section (or it's empty). Add one before tagging -- see scripts/release.sh."
            exit 1
          fi
          echo "--- release notes ---"
          cat dist/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/com_muruguard-${{ steps.version.outputs.version }}.zip
          body_path: dist/release-notes.md

      - name: Upload release to the Lyzerslab dashboard
        env:
          DASHBOARD_URL: https://www.lyzerslab.com
          DASHBOARD_PRODUCT_ID: cmruqkeub00008s5frl2g9feh
          DASHBOARD_RELEASE_TOKEN: ${{ secrets.DASHBOARD_RELEASE_TOKEN }}
        run: |
          chmod +x scripts/upload-to-dashboard.sh
          scripts/upload-to-dashboard.sh \
            "${{ steps.version.outputs.version }}" \
            "dist/com_muruguard-${{ steps.version.outputs.version }}.zip" \
            "dist/release-notes.md"