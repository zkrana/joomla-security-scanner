name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build package and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sanity-check manifest version matches tag
        run: |
          manifest_version=$(grep -oPm1 "(?<=<version>)[^<]+" com_sppbscan/sppbscan.xml || true)
          tag_version="${{ steps.version.outputs.version }}"
          if [ -z "$manifest_version" ]; then
            echo "::error::Could not find com_sppbscan/sppbscan.xml or its <version> tag."
            exit 1
          fi
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::warning::Tag is v$tag_version but sppbscan.xml <version> is $manifest_version -- update the manifest before releasing."
          fi

      - name: Build installable zip
        run: |
          mkdir -p dist
          cd com_sppbscan
          zip -r "../dist/com_sppbscan-${{ steps.version.outputs.version }}.zip" . -x ".*"
          cd ..

      - name: Verify manifest sits at zip root
        run: |
          zip_file="dist/com_sppbscan-${{ steps.version.outputs.version }}.zip"
          if ! unzip -l "$zip_file" | grep -qE '^\s*[0-9]+.*\ssppbscan\.xml$'; then
            echo "::error::sppbscan.xml is not at the root of the built zip. Joomla install will fail."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/com_sppbscan-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true