COM_MURUGUARD_DISCLAIMER="Findings are heuristic, not a guarantee. High confidence means a known malware content signature, malicious filename pattern, numeric drop folder, fake index.php, or core entry-point bootstrap violation. Medium confidence is a structural anomaly worth a manual look. Always keep a backup before deleting anything."
COM_MURUGUARD_UNINSTALL_NOTE="This scanner is now a Joomla extension, gated by your normal Joomla login and ACL — there is no separate self-destruct step. When you're done, remove it via Extensions → Manage → Manage, the same as any other component."

