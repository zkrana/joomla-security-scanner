COM_MURUGUARD_CONFIG_EXTRA_ROOT_DIRS_DESC="Comma-separated list of additional top-level folder names to treat as known/expected (e.g. old, backup, archive). Everything inside them is still scanned by content signature, but they won't be flagged just for existing."
COM_MURUGUARD_CONFIG_IGNORED_PATHS_LABEL="Ignored paths (false positives)"
COM_MURUGUARD_CONFIG_IGNORED_PATHS_DESC="One relative path per line, e.g. administrator/components/com_gdpr/Controller/ConfigController.php. Supports * as a wildcard, e.g. administrator/components/com_somevendor/* to ignore an entire extension. Matched files are skipped entirely -- use for confirmed false positives from legitimate third-party extensions."