COM_MURUGUARD_GUIDE_ACL_ADMIN_DESC="can edit the scheduled-scanning configuration (this Settings panel and the fields above)."
COM_MURUGUARD_GUIDE_LANG_TITLE="Adding another language"
COM_MURUGUARD_GUIDE_LANG_DESC="Every label, button, and message on this page reads from administrator/language/&lt;tag&gt;/&lt;tag&gt;.com_muruguard.ini. Only English (en-GB) ships today -- to add another language, copy that file into a new language's folder, translate the values (leave every key on the left exactly as-is), and it's picked up automatically once that language is installed and an admin's account is set to use it."
