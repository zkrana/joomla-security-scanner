COM_MURUGUARD_GUIDE_MAXSIZE_TITLE="Max file scan size"
COM_MURUGUARD_GUIDE_MAXSIZE_DESC="Files larger than this are skipped during content-signature scanning, so scans stay fast on sites with large media libraries. Default is 2 MB — raise it if you suspect a payload hiding inside an unusually large file, lower it if scans are timing out on a slow host."
COM_MURUGUARD_GUIDE_EXTRAROOT_TITLE="Extra allowed root directories"
COM_MURUGUARD_GUIDE_EXTRAROOT_DESC="Comma-separated top-level folder names (e.g. <code class=\"bg-gray-100 px-1 rounded\">old, backup, archive</code>) to treat as expected instead of flagging them just for existing at the webroot. Everything inside them is still scanned normally — this only silences the \"unrecognized directory\" finding for folders you know are legitimate."
COM_MURUGUARD_GUIDE_IGNOREDPATHS_TITLE="Ignored paths (false positives)"
COM_MURUGUARD_GUIDE_IGNOREDPATHS_DESC="One relative path per line — e.g. <code class=\"bg-gray-100 px-1 rounded\">administrator/components/com_example/Controller/ConfigController.php</code> — to permanently skip a confirmed false positive from a legitimate third-party extension. Supports <code class=\"bg-gray-100 px-1 rounded\">*</code> as a wildcard, e.g. <code class=\"bg-gray-100 px-1 rounded\">administrator/components/com_example/*</code> to ignore an entire extension. Use sparingly, and only after you've actually reviewed the flagged code."
COM_MURUGUARD_GUIDE_SCHEDULED_TITLE="Scheduled scanning switch, secret token, alert email"
COM_MURUGUARD_GUIDE_SCHEDULED_DESC="The exact same 3 fields as the ⏰ Scheduled Scanning tab — editing them here or there has the same effect, both read and write the same setting."
