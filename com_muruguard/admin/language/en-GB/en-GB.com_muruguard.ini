COM_MURUGUARD_GUIDE_ACL_DESC="Set on the <strong>Permissions</strong> tab of this same Global Configuration screen (not the Options tab you're on when you click the button above) -- pick a User Group there, then set each of these 4 actions to Allowed, Denied, or Inherited:"
COM_MURUGUARD_GUIDE_ACL_MANAGE_LABEL="View &amp; Scan"
COM_MURUGUARD_GUIDE_ACL_MANAGE_DESC="can open this page and run scans at all. Without this, a group never reaches the page -- it's the base requirement every other action builds on."
