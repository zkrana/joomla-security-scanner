COM_MURUGUARD_CONFIG_FIELDSET_LABEL="Scan Options"
COM_MURUGUARD_CONFIG_MAX_FILE_SIZE_LABEL="Max file scan size (bytes)"
COM_MURUGUARD_CONFIG_MAX_FILE_SIZE_DESC="Files larger than this are skipped during content-signature scanning."
COM_MURUGUARD_CONFIG_SCAN_MEDIA_LABEL="Scan media/images/tmp/cache"
COM_MURUGUARD_CONFIG_SCAN_MEDIA_DESC="Reserved for future per-directory toggles."
COM_MURUGUARD_CONFIG_SCAN_JCE_LABEL="Scan JCE editor paths"
COM_MURUGUARD_CONFIG_SCAN_JCE_DESC="Reserved for future per-directory toggles."
COM_MURUGUARD_CONFIG_FIELDSET_SCHEDULED_LABEL="Scheduled Scanning (Webcron)"
COM_MURUGUARD_CONFIG_CRON_ENABLED_LABEL="Scheduled scanning enabled"
COM_MURUGUARD_CONFIG_CRON_ENABLED_DESC="Master switch for the webcron endpoint below. While off, it always responds Forbidden regardless of the token supplied -- turn this on only once you've set a token and, if you want alerts, an email address. Can also be toggled from the Settings panel on the scanner page itself."
COM_MURUGUARD_CONFIG_CRON_TOKEN_LABEL="Cron secret token"
COM_MURUGUARD_CONFIG_CRON_TOKEN_DESC="Set a secret value here, then have your server's cron (or your host's Cron Jobs control panel, or a free external cron service) fetch this URL once a day: [your site]/administrator/index.php?option=com_muruguard&task=scanner.scheduledcheck&token=[this value]. Requires the switch above to be on, and an empty token is never accepted even if it is. The very first run only records a baseline and never sends an alert; every run after that emails you only when NEW findings appear since the previous run."
COM_MURUGUARD_CONFIG_ALERT_EMAIL_LABEL="Alert email address"
COM_MURUGUARD_CONFIG_ALERT_EMAIL_DESC="Where to send an email when a scheduled scan (see above) finds something new. Leave blank to record scan history without ever emailing."
COM_MURUGUARD_CONFIG_FIELDSET_PROTECTION_LABEL="Protection Mode"
COM_MURUGUARD_CONFIG_SHIELD_ENABLED_LABEL="Protection Mode enabled"
COM_MURUGUARD_CONFIG_SHIELD_ENABLED_DESC="Requires the separate MuRu Guard Shield plugin (System > Plugins) to also be enabled -- this component's setting controls what that plugin does, it has no effect on its own. While on, every incoming request is checked against known attack patterns and logged; nothing is blocked unless you also turn on one of the switches below. Safe to enable on a live site: detection-only, zero risk of blocking a real visitor."
COM_MURUGUARD_CONFIG_SHIELD_BLOCK_PATTERNS_LABEL="Actively block high-confidence attack patterns"
COM_MURUGUARD_CONFIG_SHIELD_BLOCK_PATTERNS_DESC="When a request matches a high-confidence rule (webshell interaction, a direct probe against the SP Page Builder uploadCustomIcon RCE, a known malware-drop filename), reject it with 403 instead of only logging it. Lower-confidence matches (path traversal probes, known scanner User-Agents) are always logged only, regardless of this setting, since those are broad enough to occasionally match legitimate traffic."
COM_MURUGUARD_CONFIG_SHIELD_BLOCK_BRUTEFORCE_LABEL="Block brute-force login attempts"
COM_MURUGUARD_CONFIG_SHIELD_BLOCK_BRUTEFORCE_DESC="When an IP address fails to log into the Joomla backend more than the threshold below within the time window below, reject further login attempts from that IP until the window passes. Every failure is logged regardless of this setting."
COM_MURUGUARD_CONFIG_SHIELD_THRESHOLD_LABEL="Failed attempts before blocking"
COM_MURUGUARD_CONFIG_SHIELD_THRESHOLD_DESC="Number of failed backend login attempts from the same IP, within the time window below, before further attempts from it are rejected."
COM_MURUGUARD_CONFIG_SHIELD_WINDOW_LABEL="Time window (minutes)"
COM_MURUGUARD_CONFIG_SHIELD_WINDOW_DESC="How far back to count failed login attempts when checking the threshold above. An IP stops being blocked once its most recent burst of failures falls outside this window."

